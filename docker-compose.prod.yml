name: prod-vahn

services:
  db:
    image: postgres:15-alpine
    container_name: vahn-postgres-db-prod
    restart: always
    environment:
      POSTGRES_USER: vahn_user
      POSTGRES_PASSWORD: vahn_pass
      POSTGRES_DB: vahn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vahn_user -d vahn_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vahn-backend-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+pg8000://vahn_user:vahn_pass@db:5432/vahn_db
      - HOST=0.0.0.0
      - PORT=8000
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vahn-frontend-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - PORT=3000
      - HOSTNAME=0.0.0.0

volumes:
  postgres_prod_data:
    name: vahn_db_prod_data
